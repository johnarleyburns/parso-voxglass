name: iOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project Voxglass.xcodeproj \
            -scheme Voxglass \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO

  guarded-tests:
    name: Guarded Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run wiring guards
        run: bash scripts/guard_wiring.sh

      - name: Guard StoreKit import boundary
        run: |
          set -euo pipefail
          matches="$(find Voxglass -name '*.swift' -print0 | xargs -0 grep -nE '^\s*import\s+StoreKit\s*$' || true)"
          if [ -z "$matches" ]; then
            exit 0
          fi

          disallowed="$(printf '%s\n' "$matches" | grep -Ev 'Voxglass/Core/Services/Pro/|Voxglass/Features/Settings/.*Paywall|Voxglass/Features/.*/ProPaywall' || true)"
          if [ -n "$disallowed" ]; then
            echo "::error title=StoreKit import guard::import StoreKit is only allowed under Core/Services/Pro/ and the paywall view."
            printf '%s\n' "$disallowed"
            exit 1
          fi

      - name: Guard runtime network endpoints
        run: |
          set -euo pipefail
          matches="$(find Voxglass -name '*.swift' -print0 | xargs -0 grep -nE 'https?://[A-Za-z0-9.-]+' || true)"
          if [ -z "$matches" ]; then
            exit 0
          fi

          disallowed="$(printf '%s\n' "$matches" | grep -Ev 'archive\.org|librivox\.org|parso\.guru' || true)"
          if [ -n "$disallowed" ]; then
            echo "::error title=Network endpoint guard::Only Internet Archive, LibriVox, and parso.guru URLs are allowed."
            printf '%s\n' "$disallowed"
            exit 1
          fi

  testflight:
    name: TestFlight Build
    runs-on: macos-latest
    needs: [compile, guarded-tests]
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      DEVELOPMENT_TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APP_BUNDLE_ID: guru.parso.voxglass

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check TestFlight secrets
        id: preflight
        run: |
          set -euo pipefail
          required=(
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_P8_BASE64
            BUILD_CERTIFICATE_BASE64
            BUILD_PROVISION_PROFILE_BASE64
            DEVELOPMENT_TEAM_ID
            KEYCHAIN_PASSWORD
            P12_PASSWORD
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::notice title=TestFlight skipped::$name is not configured."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute build number
        id: build_number
        run: |
          set -euo pipefail
          build_number="$(git rev-list --count HEAD)"
          echo "value=$build_number" >> "$GITHUB_OUTPUT"
          echo "version=1.1.$build_number" >> "$GITHUB_OUTPUT"
          echo "Using build number $build_number (marketing version 1.1.$build_number)"

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Write App Store Connect API key
        if: steps.preflight.outputs.ready == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/appstore"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/appstore/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Check App Store app record
        if: steps.preflight.outputs.ready == 'true'
        id: app_record
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require "base64"
          require "json"
          require "net/http"
          require "openssl"
          require "uri"

          def base64url(data)
            Base64.urlsafe_encode64(data).delete("=")
          end

          def raw_ecdsa_signature(der_signature)
            sequence = OpenSSL::ASN1.decode(der_signature)
            r, s = sequence.value.map { |integer| integer.value.to_s(2) }
            "#{r.rjust(32, "\0")[-32, 32]}#{s.rjust(32, "\0")[-32, 32]}"
          end

          key_id = ENV.fetch("APP_STORE_CONNECT_KEY_ID")
          issuer_id = ENV.fetch("APP_STORE_CONNECT_ISSUER_ID")
          bundle_id = ENV.fetch("APP_BUNDLE_ID")
          private_key = OpenSSL::PKey.read(File.read(File.join(ENV.fetch("RUNNER_TEMP"), "appstore", "AuthKey_#{key_id}.p8")))
          header = { alg: "ES256", kid: key_id, typ: "JWT" }
          payload = { iss: issuer_id, exp: Time.now.to_i + 20 * 60, aud: "appstoreconnect-v1" }
          signing_input = "#{base64url(JSON.generate(header))}.#{base64url(JSON.generate(payload))}"
          signature = raw_ecdsa_signature(private_key.sign(OpenSSL::Digest::SHA256.new, signing_input))
          token = "#{signing_input}.#{base64url(signature)}"

          uri = URI("https://api.appstoreconnect.apple.com/v1/apps")
          uri.query = URI.encode_www_form("filter[bundleId]" => bundle_id, "limit" => "1")
          request = Net::HTTP::Get.new(uri)
          request["Authorization"] = "Bearer #{token}"
          response = Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |http| http.request(request) }
          unless response.code.to_i == 200
            warn "::error title=App Store Connect lookup failed::#{response.code} #{response.body}"
            exit 1
          end

          has_record = !JSON.parse(response.body).fetch("data").empty?
          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") { |file| file.puts("ready=#{has_record}") }
          unless has_record
            puts "::notice title=TestFlight skipped::Create the App Store Connect app record for #{bundle_id}, then rerun this workflow."
          end
          RUBY

      - name: Install signing material
        if: steps.preflight.outputs.ready == 'true' && steps.app_record.outputs.ready == 'true'
        id: signing
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/build_certificate.p12"
          profile_path="$RUNNER_TEMP/build_profile.mobileprovision"
          profile_plist_path="$RUNNER_TEMP/build_profile.plist"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist_path"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist_path")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist_path")"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          echo "profile_name=$profile_name" >> "$GITHUB_OUTPUT"

      - name: Archive app
        if: steps.preflight.outputs.ready == 'true' && steps.app_record.outputs.ready == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            -project Voxglass.xcodeproj \
            -scheme Voxglass \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Voxglass.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_ID" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION="${{ steps.build_number.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build_number.outputs.value }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
            archive

      - name: Upload to TestFlight
        if: steps.preflight.outputs.ready == 'true' && steps.app_record.outputs.ready == 'true'
        run: |
          set -euo pipefail
          export_options="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM_ID}</string>
            <key>testFlightInternalTestingOnly</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Voxglass.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$export_options" \
            -authenticationKeyPath "$RUNNER_TEMP/appstore/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Report skipped TestFlight build
        if: steps.preflight.outputs.ready != 'true' || steps.app_record.outputs.ready != 'true'
        run: |
          echo "TestFlight upload skipped because signing secrets, the App Store Connect app record, or Xcode 26+ are not ready."
