name: Voxglass
options:
  bundleIdPrefix: guru.parso
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "31"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  Voxglass:
    type: application
    platform: iOS
    sources:
      - path: Voxglass
        excludes:
          - Resources/Info.plist
    dependencies:
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: StoreKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: libsqlite3.tbd
    info:
      path: Voxglass/Resources/Info.plist
      properties:
        CFBundleDisplayName: voxglass
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.voxglass
        PRODUCT_NAME: Voxglass
        INFOPLIST_FILE: Voxglass/Resources/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: NO
  VoxglassTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VoxglassTests
    dependencies:
      - target: Voxglass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.voxglass.tests
        INFOPLIST_FILE: VoxglassTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voxglass.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Voxglass"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_ALLOWED: NO
schemes:
  Voxglass:
    build:
      targets:
        Voxglass: all
    test:
      gatherCoverageData: true
      targets:
        - VoxglassTests
