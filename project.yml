name: Voxglass
options:
  bundleIdPrefix: guru.parso
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  VoxglassCore:
    path: .
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "52"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
targets:
  Voxglass:
    type: application
    platform: iOS
    sources:
      - path: Voxglass
        excludes:
          - Resources/Info.plist
          - Resources/Voxglass.entitlements
          - Core
    dependencies:
      - package: VoxglassCore
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CarPlay.framework
      - sdk: MediaPlayer.framework
      - sdk: StoreKit.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: libsqlite3.tbd
    info:
      path: Voxglass/Resources/Info.plist
      properties:
        CFBundleDisplayName: Voxglass
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneClassName: CPTemplateApplicationScene
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.voxglass
        PRODUCT_NAME: Voxglass
        INFOPLIST_FILE: Voxglass/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Voxglass/Resources/Voxglass.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Parso Voxglass App Store"
  VoxglassUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - VoxglassUITests
    dependencies:
      - target: Voxglass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.voxglass.uitests
        TEST_TARGET_NAME: Voxglass
        CODE_SIGNING_ALLOWED: NO
  VoxglassCarPlaySmokeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VoxglassCarPlaySmokeTests
    dependencies:
      - target: Voxglass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.voxglass.carplaysmoke
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voxglass.app/Voxglass"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_ALLOWED: NO
schemes:
  Voxglass:
    build:
      targets:
        Voxglass: all
    test:
      gatherCoverageData: true
      targets:
        - VoxglassUITests
        - VoxglassCarPlaySmokeTests
